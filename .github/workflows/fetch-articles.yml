name: fetch-articles

on:
  schedule:
    - cron: "0 23 * * *"
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Call Vercel cron endpoint
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          set -euo pipefail
          response=$(mktemp)
          status=$(curl -sS -o "$response" -w "%{http_code}" \
            --max-time 540 \
            -H "Authorization: Bearer $CRON_SECRET" \
            https://claude-now-plum.vercel.app/api/cron/fetch-articles)
          echo "HTTP $status"
          cat "$response"
          echo
          test "$status" = "200"
